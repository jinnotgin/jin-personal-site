name: Prune Cloudflare Pages deployments

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "List deployments that would be deleted without deleting them"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  prune:
    name: Keep latest Cloudflare Pages deployments
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CF_ACCOUNT_ID: ${{ vars.CF_ACCOUNT_ID }}
      CF_PAGES_PROJECT_NAME: ${{ vars.CF_PAGES_PROJECT_NAME }}
      KEEP_DEPLOYMENTS: ${{ vars.KEEP_DEPLOYMENTS || '30' }}
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}

    steps:
      - name: Validate configuration
        run: |
          set -euo pipefail

          missing=0
          for name in CF_API_TOKEN CF_ACCOUNT_ID CF_PAGES_PROJECT_NAME KEEP_DEPLOYMENTS; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not configured"
              missing=1
            fi
          done

          if ! [[ "$KEEP_DEPLOYMENTS" =~ ^[0-9]+$ ]] || [ "$KEEP_DEPLOYMENTS" -lt 1 ]; then
            echo "::error::KEEP_DEPLOYMENTS must be a positive integer"
            missing=1
          fi

          exit "$missing"

      - name: Prune old deployments
        run: |
          set -euo pipefail

          api_base="https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/$CF_PAGES_PROJECT_NAME"
          per_page=25
          page=1
          deployments_file="$(mktemp)"
          delete_file="$(mktemp)"

          echo "[]" > "$deployments_file"

          while true; do
            response="$(curl --silent --show-error \
              --header "Authorization: Bearer $CF_API_TOKEN" \
              "$api_base/deployments?per_page=$per_page&page=$page")"

            success="$(jq -r ".success" <<< "$response")"
            if [ "$success" != "true" ]; then
              echo "$response" | jq .
              echo "::error::Cloudflare API returned an unsuccessful response"
              exit 1
            fi

            jq -s ".[0] + .[1].result" "$deployments_file" <(jq "." <<< "$response") > "$deployments_file.next"
            mv "$deployments_file.next" "$deployments_file"

            total_pages="$(jq -r ".result_info.total_pages // 1" <<< "$response")"
            if [ "$page" -ge "$total_pages" ]; then
              break
            fi

            page=$((page + 1))
          done

          jq --argjson keep "$KEEP_DEPLOYMENTS" \
            'sort_by(.created_on)
             | reverse
             | .[$keep:]
             | map(select(.env != "production"))
             | map({id, created_on, env, url})' \
            "$deployments_file" > "$delete_file"

          delete_count="$(jq "length" "$delete_file")"
          total_count="$(jq "length" "$deployments_file")"

          echo "Found $total_count deployments."
          echo "Keeping latest $KEEP_DEPLOYMENTS deployments."
          echo "Selected $delete_count old preview deployments for deletion."

          if [ "$delete_count" -eq 0 ]; then
            exit 0
          fi

          jq -r '.[] | "- \(.created_on) \(.env) \(.id) \(.url)"' "$delete_file"

          if [ "$DRY_RUN" = "true" ]; then
            echo "Dry run enabled; no deployments deleted."
            exit 0
          fi

          jq -r ".[].id" "$delete_file" | while read -r deployment_id; do
            echo "Deleting deployment $deployment_id"
            response="$(curl --silent --show-error --request DELETE \
              --header "Authorization: Bearer $CF_API_TOKEN" \
              "$api_base/deployments/$deployment_id?force=true")"
            success="$(jq -r ".success" <<< "$response")"
            if [ "$success" != "true" ]; then
              echo "$response" | jq .
              echo "::error::Failed to delete deployment $deployment_id"
              exit 1
            fi
            echo
          done
